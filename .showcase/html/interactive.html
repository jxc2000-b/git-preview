<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interactive Demo</title>
    <style>
      body {
        margin: 0;
        padding: 0.5rem;
        font-family: system-ui, sans-serif;
      }

      button {
        padding: 0.75rem 1rem;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="demo-button" type="button">Click for an interactive demo</button>

    <script>
      const button = document.querySelector("#demo-button");

      button.addEventListener("click", () => {
        button.textContent = "You've clicked this interactive demo";
      });
    </script>
  </body>
</html>
