
name: Deploy git-preview to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create bare preview repository
        env:
          REPOSITORY_DESCRIPTION: ${{ github.event.repository.description }}
        run: |
          git clone --bare . preview-repos/git-preview
          printf '%s\n' "$REPOSITORY_DESCRIPTION" > preview-repos/git-preview/description

      - name: Generate static site
        run: go run . -config config.yaml -export showcase/out

      # GitHub project Pages serves the artifact at /<repository>/, while
      # git-preview exports each repository into its own directory. Make that
      # repository directory the artifact root and prefix the shared assets.
      - name: Prepare site for GitHub project Pages
        env:
          REPOSITORY_NAME: ${{ github.event.repository.name }}
        run: |
          cp -R showcase/out/static "showcase/out/$REPOSITORY_NAME/static"
          find "showcase/out/$REPOSITORY_NAME" -type f -name '*.html' -exec sed -i "s|\"/static/|\"/$REPOSITORY_NAME/static/|g" {} +

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: showcase/out/${{ github.event.repository.name }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
