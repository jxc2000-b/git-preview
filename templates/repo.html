{{ define "repo" }}
<html>
{{ template "head" . }}

{{ template "repoheader" . }}

  <body>
    {{ template "nav" . }}
    <main>
{{- if .readme }}
      <article class="readme">
        {{- .readme -}}
      </article>
{{- end }}
      {{ template "showcase" . }}

    </main>
  </body>
</html>
{{ end }}
